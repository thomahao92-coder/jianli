<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComfyUI 工作流美工 - 作品集</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/data.js"></script>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">我的作品集</div>
            <ul class="nav-menu">
                <li><a href="#home" class="nav-link">首页</a></li>
                <li><a href="#portfolio" class="nav-link">作品展示</a></li>
                <li><a href="#workflow" class="nav-link">工作流</a></li>
                <li><a href="#about" class="nav-link">关于我</a></li>
                <li><a href="#contact" class="nav-link">联系方式</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- 首页/Hero 区域 -->
    <section id="home" class="hero">
        <div class="hero-content">
            <h1 class="hero-title">ComfyUI 工作流美工</h1>
            <p class="hero-subtitle">用 AI 创造视觉可能</p>
            <a href="#portfolio" class="btn-primary">查看作品</a>
        </div>
    </section>

    <!-- 作品展示区域 -->
    <section id="portfolio" class="portfolio">
        <div class="container">
            <h2 class="section-title">作品展示</h2>
            <p class="section-subtitle">精选 ComfyUI 生成作品</p>

            <div class="gallery-grid" id="gallery-grid">
                <!-- 由 JS 动态渲染 -->
            </div>
        </div>
    </section>

    <!-- 工作流展示区域 -->
    <section id="workflow" class="workflow">
        <div class="container">
            <h2 class="section-title">工作流展示</h2>
            <p class="section-subtitle">ComfyUI 节点流程与技术方案</p>

            <div class="workflow-grid" id="workflow-grid">
                <!-- 由 JS 动态渲染 -->
            </div>
        </div>
    </section>

    <!-- 关于我区域 -->
    <section id="about" class="about">
        <div class="container">
            <h2 class="section-title">关于我</h2>
            <div class="about-content" id="about-content">
                <!-- 由 JS 动态渲染 -->
            </div>
        </div>
    </section>

    <!-- 联系方式区域 -->
    <section id="contact" class="contact">
        <div class="container">
            <h2 class="section-title">联系我</h2>
            <p class="section-subtitle">期待与您合作</p>

            <div class="contact-info" id="contact-info">
                <!-- 由 JS 动态渲染 -->
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 ComfyUI 工作流美工作品集. All rights reserved.</p>
        </div>
    </footer>

    <!-- 图片灯箱 -->
    <div id="lightbox" class="lightbox">
        <span class="lightbox-close">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
        <div class="lightbox-caption"></div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
